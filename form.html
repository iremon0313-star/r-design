<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R.Desing 依頼フォーム</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="sanitize.css">
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <header class="form-header">
        <p class="title-form">依頼フォーム</p>
        <a href="index.html" class="back-home">
            <span class="home-icon">⌂</span>
            <span class="home-text">HOME</span>
        </a>
    </header>
    <form class="contact-form" 
                action="https://usebasin.com/f/b14c13c3386f" 
                method="post"
                data-redirect="https://iremon0313-star.github.io/r-design/thx.html">
        <label class="text">お名前</label><br>
        <input type="text" id="name" name="name" required><br>

        <label class="email">メールアドレス</label><br>
        <input type="email" id="email" name="email" required><br>

        <label class="subject">ご依頼内容</label><br>
        <input type="text" id="subject" name="subject" placeholder="例：バナー制作のご依頼"><br>

        <label class="message">ご希望・ご相談(自由記載)</label><br>
        <textarea id="message" name="message" placeholder="ご希望のイメージや用途など、ご自由にご記入ください"></textarea><br>

        <button type="submit" class="button">送信する</button>
    </form>
    
    
</body>
</html>
